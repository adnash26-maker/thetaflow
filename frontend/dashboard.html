<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThetaFlow — Investment Intelligence</title>
    <style>
        :root { --bg:#0a0e17; --surface:#111827; --surface2:#1a2234; --border:#1f2937; --text:#e5e7eb; --muted:#9ca3af; --accent:#6366f1; --green:#10b981; --red:#ef4444; --yellow:#f59e0b; --purple:#8b5cf6; --cyan:#06b6d4; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; height:100vh; display:flex; flex-direction:column; }

        /* Nav */
        .nav { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
        .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-actions { display:flex; gap:8px; }
        .btn { padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; font-size:13px; transition:all 0.2s; }
        .btn:hover { border-color:var(--accent); }

        /* Chat Layout */
        .chat-container { flex:1; overflow-y:auto; padding:20px 0; }
        .chat-inner { max-width:800px; margin:0 auto; padding:0 20px; }

        /* Messages */
        .msg { margin-bottom:20px; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .msg-system { }
        .msg-user { display:flex; justify-content:flex-end; }
        .msg-user .msg-bubble { background:var(--accent); border-radius:16px 16px 4px 16px; max-width:70%; padding:12px 16px; }
        .msg-ai { }
        .msg-ai .msg-bubble { background:var(--surface); border:1px solid var(--border); border-radius:4px 16px 16px 16px; padding:16px 20px; }
        .msg-label { font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }

        /* Signal Card (system message) */
        .signal-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
        .signal-headline { font-size:15px; font-weight:600; margin-bottom:8px; }
        .signal-meta { font-size:12px; color:var(--muted); margin-bottom:10px; }
        .signal-chains { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
        .chain-tag { font-size:11px; padding:3px 10px; border-radius:6px; font-weight:600; border:1px solid; }
        .signal-picks { display:flex; gap:8px; flex-wrap:wrap; }
        .pick-chip { display:inline-flex; align-items:center; gap:6px; background:var(--surface2); padding:6px 12px; border-radius:8px; font-size:13px; }
        .pick-ticker { font-weight:700; color:var(--accent); }
        .pick-price { font-weight:600; }
        .pick-conviction { font-size:11px; color:var(--muted); }

        /* Chain Expansion */
        .chain-expand { background:var(--surface2); border-radius:10px; margin-top:12px; overflow:hidden; }
        .chain-layer { padding:12px 16px; border-bottom:1px solid var(--border); }
        .chain-layer:last-child { border:none; }
        .layer-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .layer-name { font-weight:700; font-size:13px; }
        .layer-sensitivity { font-size:11px; color:var(--muted); }
        .layer-desc { font-size:12px; color:var(--muted); margin-bottom:8px; }
        .layer-tickers { display:flex; flex-wrap:wrap; gap:6px; }
        .ticker-chip { background:var(--bg); padding:6px 10px; border-radius:6px; font-size:12px; display:flex; align-items:center; gap:8px; }
        .ticker-chip .sym { font-weight:700; color:var(--accent); }
        .ticker-chip .price { font-weight:600; }
        .ticker-chip .chg { font-size:11px; }
        .positive { color:var(--green); }
        .negative { color:var(--red); }

        /* Suggestion Pills */
        .suggestions { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
        .suggestion { padding:10px 16px; border-radius:20px; border:1px solid var(--border); background:var(--surface); cursor:pointer; font-size:13px; transition:all 0.2s; }
        .suggestion:hover { border-color:var(--accent); background:var(--accent)10; transform:translateY(-1px); }
        .suggestion-icon { margin-right:4px; }

        /* Input Bar */
        .input-bar { padding:12px 20px; background:var(--surface); border-top:1px solid var(--border); flex-shrink:0; }
        .input-inner { max-width:800px; margin:0 auto; display:flex; gap:8px; }
        .chat-input { flex:1; padding:12px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:15px; outline:none; }
        .chat-input:focus { border-color:var(--accent); }
        .chat-input::placeholder { color:#4b5563; }
        .send-btn { padding:12px 20px; border-radius:12px; border:none; background:var(--accent); color:white; font-size:14px; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
        .send-btn:hover { opacity:0.9; }
        .send-btn:disabled { opacity:0.5; cursor:not-allowed; }

        /* Typing indicator */
        .typing { display:flex; gap:4px; padding:8px 0; }
        .typing span { width:6px; height:6px; background:var(--muted); border-radius:50%; animation:bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay:0.2s; }
        .typing span:nth-child(3) { animation-delay:0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

        /* Summary */
        .summary-text { font-size:14px; line-height:1.7; margin-bottom:12px; }
        .disclaimer { font-size:11px; color:#4b5563; font-style:italic; margin-top:12px; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-logo">ThetaFlow</div>
    <div class="nav-actions">
        <button class="btn" onclick="exportCSV()">Export CSV</button>
        <button class="btn" id="authBtn" onclick="showAuth()">Sign In</button>
    </div>
</nav>

<div class="chat-container" id="chatContainer">
    <div class="chat-inner" id="chatInner">
        <!-- Welcome message -->
        <div class="msg msg-ai">
            <div class="msg-label">ThetaFlow</div>
            <div class="msg-bubble">
                <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Welcome to ThetaFlow ⚡</div>
                <p style="color:var(--muted);margin-bottom:16px;">I analyze breaking events and map their investment impact across entire value chains — from raw materials to end applications.</p>
                <p style="margin-bottom:16px;">Ask me about any market event, or pick a suggestion below:</p>
                <div class="suggestions" id="suggestions"></div>
            </div>
        </div>

        <!-- Auto-loaded signals will appear here -->
        <div id="signalsArea"></div>
    </div>
</div>

<div class="input-bar">
    <div class="input-inner">
        <input type="text" class="chat-input" id="chatInput" placeholder="Ask about any market event, company, or macro trend..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Analyze →</button>
    </div>
</div>

<!-- Auth Modal -->
<div style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;" id="authModal">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;width:90%;max-width:400px;padding:32px;position:relative;">
        <button onclick="document.getElementById('authModal').style.display='none'" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;">&times;</button>
        <h3 id="authTitle" style="margin-bottom:16px;text-align:center;">Sign In</h3>
        <div id="authError" style="display:none;color:var(--red);font-size:13px;margin-bottom:12px;text-align:center;"></div>
        <input type="email" id="authEmail" placeholder="Email" style="width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:12px;outline:none;font-size:14px;">
        <input type="password" id="authPassword" placeholder="Password" style="width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:16px;outline:none;font-size:14px;">
        <button class="send-btn" style="width:100%;padding:12px;margin-bottom:12px;" onclick="submitAuth()">Sign In</button>
        <p style="text-align:center;font-size:13px;color:var(--muted);" id="authToggleText">
            Don't have an account? <a href="#" onclick="toggleAuth()" style="color:var(--accent);">Register</a>
        </p>
    </div>
</div>

<script>
const API = window.location.origin + '/api';
let authMode = 'login';
let currentUser = null;

// ── Suggestions ──

const SUGGESTIONS = [
    { icon: '🤖', text: 'What if NVIDIA beats earnings by 20%?' },
    { icon: '⚛️', text: 'Impact of new nuclear plant for data centers' },
    { icon: '💊', text: 'Eli Lilly GLP-1 drug gets FDA fast-track approval' },
    { icon: '🔒', text: 'Major ransomware attack hits US healthcare system' },
    { icon: '⚡', text: 'Biden signs $50B clean energy infrastructure bill' },
    { icon: '🏭', text: 'TSMC announces $100B investment in US chip fabs' },
];

function renderSuggestions() {
    const el = document.getElementById('suggestions');
    el.innerHTML = SUGGESTIONS.map(s =>
        `<div class="suggestion" onclick="submitSuggestion('${s.text.replace(/'/g, "\\'")}')">
            <span class="suggestion-icon">${s.icon}</span> ${s.text}
        </div>`
    ).join('');
}

function submitSuggestion(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
}

// ── Chat Messages ──

function addUserMessage(text) {
    const html = `<div class="msg msg-user"><div class="msg-bubble">${text}</div></div>`;
    document.getElementById('signalsArea').insertAdjacentHTML('beforeend', html);
    scrollToBottom();
}

function addTypingIndicator() {
    const html = `<div class="msg msg-ai" id="typingMsg"><div class="msg-label">ThetaFlow</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
    document.getElementById('signalsArea').insertAdjacentHTML('beforeend', html);
    scrollToBottom();
}

function removeTypingIndicator() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
}

function addAnalysisMessage(data) {
    let html = '<div class="msg msg-ai"><div class="msg-label">ThetaFlow</div><div class="msg-bubble">';

    // Summary
    if (data.summary) {
        html += `<div class="summary-text">${data.summary}</div>`;
    }

    // Chain tags
    if (data.chains && data.chains.length) {
        html += '<div class="signal-chains">';
        data.chains.forEach(c => {
            html += `<span class="chain-tag" style="border-color:${c.theme_color};color:${c.theme_color};">${c.chain_name} ${(c.relevance_score*100).toFixed(0)}%</span>`;
        });
        html += '</div>';
    }

    // Top picks as chips
    if (data.top_picks && data.top_picks.length) {
        html += '<div style="margin-top:12px;margin-bottom:4px;font-size:12px;color:var(--muted);font-weight:600;">TOP PICKS</div>';
        html += '<div class="signal-picks">';
        data.top_picks.forEach(t => {
            const dir = t.direction === 'bullish' ? '🟢' : '🔴';
            const priceStr = t.current_price ? `$${t.current_price.toFixed(2)}` : '';
            const chgClass = (t.change_pct || 0) >= 0 ? 'positive' : 'negative';
            const chgStr = t.current_price ? `${t.change_pct >= 0 ? '+' : ''}${t.change_pct.toFixed(1)}%` : '';
            html += `<div class="pick-chip">
                ${dir} <span class="pick-ticker">${t.ticker}</span>
                <span class="pick-price">${priceStr}</span>
                <span class="${chgClass}">${chgStr}</span>
                <span class="pick-conviction">${(t.conviction*100).toFixed(0)}%</span>
            </div>`;
        });
        html += '</div>';
    }

    // Full chain expansion for all recommendations
    if (data.recommendations && data.recommendations.length) {
        // Group by chain → layer
        const byChain = {};
        data.recommendations.forEach(r => {
            if (!byChain[r.chain_name]) byChain[r.chain_name] = {};
            if (!byChain[r.chain_name][r.layer]) byChain[r.chain_name][r.layer] = [];
            byChain[r.chain_name][r.layer].push(r);
        });

        for (const [chainName, layers] of Object.entries(byChain)) {
            html += `<div class="chain-expand" style="margin-top:12px;">`;
            html += `<div style="padding:10px 16px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border);color:var(--purple);">⛓️ ${chainName} — Full Value Chain</div>`;

            for (const [layerName, tickers] of Object.entries(layers)) {
                html += `<div class="chain-layer">`;
                html += `<div class="layer-name">${layerName}</div>`;
                html += `<div class="layer-tickers">`;
                tickers.forEach(t => {
                    const dir = t.direction === 'bullish' ? '🟢' : '🔴';
                    const priceStr = t.current_price ? `$${t.current_price.toFixed(2)}` : '';
                    const chgClass = (t.change_pct || 0) >= 0 ? 'positive' : 'negative';
                    const chgStr = t.current_price ? `(${t.change_pct >= 0 ? '+' : ''}${t.change_pct.toFixed(1)}%)` : '';
                    html += `<div class="ticker-chip">
                        ${dir} <span class="sym">${t.ticker}</span>
                        <span class="price">${priceStr}</span>
                        <span class="chg ${chgClass}">${chgStr}</span>
                    </div>`;
                });
                html += '</div></div>';
            }
            html += '</div>';
        }
    }

    html += '<div class="disclaimer">Not financial advice. For informational purposes only.</div>';
    html += '</div></div>';

    document.getElementById('signalsArea').insertAdjacentHTML('beforeend', html);
    scrollToBottom();
}

function addSignalCards(signals) {
    if (!signals.length) return;

    let html = '<div class="msg msg-ai"><div class="msg-label">ThetaFlow · Latest Signals</div><div class="msg-bubble">';
    html += `<div style="font-weight:700;margin-bottom:12px;">📡 ${signals.length} events matched to value chains in the last 72 hours:</div>`;

    signals.forEach(s => {
        const severity = s.severity === 'high' ? '🔴' : '🟡';
        const chains = (s.chains || []).map(c =>
            `<span class="chain-tag" style="border-color:${c.theme_color || 'var(--border)'};color:${c.theme_color || 'var(--muted)'};">${c.chain_name}</span>`
        ).join(' ');
        const picks = (s.top_picks || []).map(t => {
            const dir = t.direction === 'bullish' ? '🟢' : '🔴';
            return `<div class="pick-chip">${dir} <span class="pick-ticker">${t.ticker}</span> <span class="pick-conviction">${(t.conviction*100).toFixed(0)}%</span></div>`;
        }).join('');

        html += `<div class="signal-card">
            <div class="signal-headline">${severity} ${s.title}</div>
            <div class="signal-meta">${s.source} · ${getTimeAgo(s.timestamp)}</div>
            <div class="signal-chains">${chains}</div>
            <div class="signal-picks">${picks}</div>
        </div>`;
    });

    html += '</div></div>';
    document.getElementById('signalsArea').insertAdjacentHTML('beforeend', html);
    scrollToBottom();
}

// ── Core Actions ──

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    addUserMessage(text);
    addTypingIndicator();

    document.getElementById('sendBtn').disabled = true;

    try {
        const resp = await fetch(`${API}/analyze`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ headline: text })
        });
        const data = await resp.json();
        removeTypingIndicator();

        if (data.success && data.chains_matched > 0) {
            addAnalysisMessage(data);
        } else {
            addAnalysisMessage({
                summary: "I couldn't map this event to any tracked value chains. Try mentioning specific companies, sectors, or technologies like AI, semiconductors, cybersecurity, clean energy, or GLP-1 drugs.",
                chains: [], top_picks: [], recommendations: []
            });
        }
    } catch(e) {
        removeTypingIndicator();
        addAnalysisMessage({ summary: "Failed to analyze. Please try again.", chains: [], top_picks: [], recommendations: [] });
    }

    document.getElementById('sendBtn').disabled = false;
}

async function loadSignals() {
    try {
        const resp = await fetch(`${API}/signals?hours=72&limit=5`);
        const data = await resp.json();
        if (data.success && data.signals.length) {
            addSignalCards(data.signals);
        }
    } catch(e) {}
}

function scrollToBottom() {
    const container = document.getElementById('chatContainer');
    setTimeout(() => container.scrollTop = container.scrollHeight, 50);
}

function getTimeAgo(ts) {
    const diff = (Date.now() - new Date(ts).getTime()) / 1000;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
}

function exportCSV() { window.location.href = `${API}/export`; }

// ── Auth ──
async function checkAuth() {
    try {
        const resp = await fetch(`${API}/auth/me`, {credentials:'same-origin'});
        const data = await resp.json();
        if (data.authenticated) {
            currentUser = data.user;
            document.getElementById('authBtn').textContent = data.user.email.split('@')[0];
        }
    } catch(e) {}
}

function showAuth() {
    if (currentUser) {
        if (confirm(`${currentUser.email}\nTier: ${currentUser.tier}\n\nSign out?`)) {
            fetch(`${API}/auth/logout`, {method:'POST',credentials:'same-origin'});
            currentUser = null;
            document.getElementById('authBtn').textContent = 'Sign In';
        }
        return;
    }
    authMode = 'login';
    document.getElementById('authTitle').textContent = 'Sign In';
    document.getElementById('authModal').style.display = 'flex';
}

function toggleAuth() {
    authMode = authMode === 'login' ? 'register' : 'login';
    document.getElementById('authTitle').textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
    document.getElementById('authToggleText').innerHTML = authMode === 'login'
        ? 'Don\'t have an account? <a href="#" onclick="toggleAuth()" style="color:var(--accent);">Register</a>'
        : 'Already have an account? <a href="#" onclick="toggleAuth()" style="color:var(--accent);">Sign In</a>';
}

async function submitAuth() {
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    const endpoint = authMode === 'login' ? '/auth/login' : '/auth/register';
    try {
        const resp = await fetch(`${API}${endpoint}`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            credentials:'same-origin', body:JSON.stringify({email,password})
        });
        const data = await resp.json();
        if (data.success || data.user) {
            currentUser = data.user;
            document.getElementById('authBtn').textContent = data.user.email.split('@')[0];
            document.getElementById('authModal').style.display = 'none';
        } else {
            document.getElementById('authError').textContent = data.error;
            document.getElementById('authError').style.display = 'block';
        }
    } catch(e) {}
}

// ── Init ──
renderSuggestions();
loadSignals();
checkAuth();
document.getElementById('chatInput').focus();
</script>
</body>
</html>
