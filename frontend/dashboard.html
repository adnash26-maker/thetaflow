<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThetaFlow — Investment Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root { --bg:#0a0e17; --surface:#111827; --surface2:#1a2234; --border:#1f2937; --text:#e5e7eb; --muted:#9ca3af; --accent:#6366f1; --green:#10b981; --red:#ef4444; --yellow:#f59e0b; --purple:#8b5cf6; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
        .nav { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
        .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#6366f1,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-actions { display:flex; gap:8px; align-items:center; }
        .btn { padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; font-size:13px; transition:all 0.2s; }
        .btn:hover { border-color:var(--accent); }
        .btn.primary { background:var(--accent); border-color:var(--accent); color:white; }
        .container { max-width:1400px; margin:0 auto; padding:20px 28px; }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
        .panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
        .panel-title { font-weight:700; font-size:15px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
        .badge { font-size:11px; padding:3px 8px; border-radius:6px; font-weight:600; }
        .badge-green { background:#10b98120; color:#10b981; }
        .badge-red { background:#ef444420; color:#ef4444; }
        .badge-purple { background:#8b5cf620; color:#8b5cf6; }
        .chain-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:16px; cursor:pointer; transition:all 0.2s; }
        .chain-card:hover { border-color:var(--accent); transform:translateY(-2px); }
        .chain-card h3 { font-size:16px; margin-bottom:6px; }
        .chain-card p { font-size:13px; color:var(--muted); }
        .chain-stats { display:flex; gap:16px; margin-top:10px; font-size:12px; color:var(--muted); }
        .chain-stats span { display:flex; align-items:center; gap:4px; }
        .event-item { padding:12px 0; border-bottom:1px solid var(--border); }
        .event-item:last-child { border:none; }
        .event-title { font-size:14px; font-weight:500; margin-bottom:4px; }
        .event-meta { font-size:12px; color:var(--muted); display:flex; gap:12px; }
        .event-chains { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
        .chain-tag { font-size:11px; padding:2px 8px; border-radius:4px; background:var(--surface2); border:1px solid var(--border); }
        .ticker-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
        .ticker-row:last-child { border:none; }
        .ticker-symbol { font-weight:700; color:var(--accent); min-width:60px; }
        .ticker-company { flex:1; margin:0 12px; }
        .ticker-layer { font-size:12px; color:var(--muted); }
        .ticker-price { text-align:right; font-weight:600; }
        .ticker-change { text-align:right; font-size:13px; min-width:70px; }
        .positive { color:var(--green); }
        .negative { color:var(--red); }
        .analyze-input { width:100%; padding:14px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:15px; outline:none; }
        .analyze-input:focus { border-color:var(--accent); }
        .analyze-input::placeholder { color:#4b5563; }
        .analyze-btn { margin-top:10px; width:100%; padding:12px; }
        .analysis-result { margin-top:16px; }
        .rec-card { background:var(--surface2); border-radius:8px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
        .conviction-bar { height:4px; border-radius:2px; background:var(--border); margin-top:4px; }
        .conviction-fill { height:100%; border-radius:2px; background:var(--accent); }
        .summary-box { background:var(--surface2); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; padding:14px 16px; margin-top:12px; font-size:14px; line-height:1.6; }
        .loading { text-align:center; padding:40px; color:var(--muted); }
        .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 12px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        /* Modal */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:90%; max-width:500px; max-height:85vh; overflow-y:auto; padding:32px; position:relative; }
        .modal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:var(--muted); font-size:24px; cursor:pointer; }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-logo">ThetaFlow</div>
    <div class="nav-actions">
        <button class="btn" onclick="loadData()">Refresh</button>
        <button class="btn" onclick="exportCSV()">Export CSV</button>
        <button class="btn" id="authBtn" onclick="showAuth()">Sign In</button>
    </div>
</nav>

<div class="container">
    <!-- Event Analyzer -->
    <div class="panel" style="margin-bottom:16px;">
        <div class="panel-title">🔍 Event Analyzer <span class="badge badge-purple">AI-Powered</span></div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Paste a news headline to see which value chains and tickers are impacted.</p>
        <input type="text" class="analyze-input" id="analyzeInput" placeholder="e.g. Microsoft announces $80B AI infrastructure investment for 2026" onkeydown="if(event.key==='Enter')analyzeEvent()">
        <button class="btn primary analyze-btn" onclick="analyzeEvent()">Analyze Impact</button>
        <div id="analysisResult"></div>
    </div>

    <!-- Value Chains -->
    <div class="panel-title" style="margin-bottom:12px;">⛓️ Value Chains</div>
    <div class="grid-2" id="chainsGrid" style="margin-bottom:20px;">
        <div class="loading"><div class="spinner"></div>Loading chains...</div>
    </div>

    <div class="grid-2">
        <!-- Recent Events -->
        <div class="panel">
            <div class="panel-title">📰 Latest Catalysts <span class="badge badge-green" id="eventCount">0</span></div>
            <div id="eventsContainer">
                <div class="loading"><div class="spinner"></div>Loading events...</div>
            </div>
        </div>

        <!-- Portfolio View -->
        <div class="panel">
            <div class="panel-title">📊 Portfolio Recommendations <span class="badge badge-purple" id="tickerCount">0 tickers</span></div>
            <div id="portfolioContainer">
                <div class="loading"><div class="spinner"></div>Loading portfolio...</div>
            </div>
        </div>
    </div>
</div>

<!-- Chain Detail Modal -->
<div class="modal-overlay" id="chainModal">
    <div class="modal" style="max-width:700px">
        <button class="modal-close" onclick="document.getElementById('chainModal').classList.remove('show')">&times;</button>
        <div id="chainDetail"></div>
    </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
    <div class="modal" style="max-width:400px">
        <button class="modal-close" onclick="document.getElementById('authModal').classList.remove('show')">&times;</button>
        <h3 id="authTitle" style="margin-bottom:16px;text-align:center;">Sign In</h3>
        <div id="authError" style="display:none;color:var(--red);font-size:13px;margin-bottom:12px;text-align:center;"></div>
        <input type="email" id="authEmail" placeholder="Email" style="width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:12px;outline:none;font-size:14px;">
        <input type="password" id="authPassword" placeholder="Password" style="width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);margin-bottom:16px;outline:none;font-size:14px;">
        <button class="btn primary" style="width:100%;padding:12px;margin-bottom:12px;" onclick="submitAuth()">Sign In</button>
        <p style="text-align:center;font-size:13px;color:var(--muted);" id="authToggleText">
            Don't have an account? <a href="#" onclick="toggleAuth()" style="color:var(--accent);">Register</a>
        </p>
    </div>
</div>

<script>
const API = window.location.origin + '/api';
let authMode = 'login';
let currentUser = null;

async function loadData() {
    loadChains();
    loadEvents();
    loadPortfolio();
    checkAuth();
}

async function loadChains() {
    try {
        const resp = await fetch(`${API}/chains`);
        const data = await resp.json();
        if (!data.success) return;
        const grid = document.getElementById('chainsGrid');
        grid.innerHTML = data.chains.map(c => `
            <div class="chain-card" onclick="showChain('${c.id}')" style="border-left:3px solid ${c.theme_color}">
                <h3>${c.name}</h3>
                <p>${c.description.substring(0, 120)}...</p>
                <div class="chain-stats">
                    <span>📊 ${c.node_count} layers</span>
                    <span>🏷️ ${c.ticker_count} tickers</span>
                </div>
            </div>
        `).join('');
    } catch(e) { console.error(e); }
}

async function loadEvents() {
    try {
        const resp = await fetch(`${API}/events?hours=72&limit=20`);
        const data = await resp.json();
        if (!data.success) return;
        document.getElementById('eventCount').textContent = data.count;
        const container = document.getElementById('eventsContainer');
        if (!data.events.length) { container.innerHTML = '<p style="color:var(--muted);padding:20px;">No events yet. Click Refresh to collect.</p>'; return; }
        container.innerHTML = data.events.map(e => {
            const chains = (e.matched_chains || []).map(c =>
                `<span class="chain-tag" style="border-color:${c.theme_color || 'var(--border)'}">${c.chain_name}</span>`
            ).join('');
            const severity = e.severity === 'high' ? '🔴' : e.severity === 'critical' ? '🔴🔴' : '🟡';
            const timeAgo = getTimeAgo(e.timestamp);
            return `<div class="event-item">
                <div class="event-title">${severity} ${e.title}</div>
                <div class="event-meta"><span>${e.source}</span><span>${timeAgo}</span></div>
                ${chains ? `<div class="event-chains">${chains}</div>` : ''}
            </div>`;
        }).join('');
    } catch(e) { console.error(e); }
}

async function loadPortfolio() {
    try {
        const resp = await fetch(`${API}/portfolio`);
        const data = await resp.json();
        if (!data.success) return;
        document.getElementById('tickerCount').textContent = `${data.total_tickers} tickers`;
        const container = document.getElementById('portfolioContainer');
        container.innerHTML = data.tickers.slice(0, 25).map(t => {
            const changeClass = t.change_pct >= 0 ? 'positive' : 'negative';
            const changeStr = t.current_price ? `${t.change_pct >= 0 ? '+' : ''}${t.change_pct.toFixed(1)}%` : '—';
            const priceStr = t.current_price ? `$${t.current_price.toFixed(2)}` : '—';
            const dirIcon = t.direction === 'bullish' ? '🟢' : '🔴';
            return `<div class="ticker-row">
                <span class="ticker-symbol">${dirIcon} ${t.ticker}</span>
                <div class="ticker-company">
                    <div>${t.company}</div>
                    <div class="ticker-layer">${t.chain_name} → ${t.layer}</div>
                </div>
                <span class="ticker-price">${priceStr}</span>
                <span class="ticker-change ${changeClass}">${changeStr}</span>
            </div>`;
        }).join('');
    } catch(e) { console.error(e); }
}

async function showChain(chainId) {
    try {
        const resp = await fetch(`${API}/chains/${chainId}`);
        const data = await resp.json();
        if (!data.success) return;

        let html = `<h2 style="margin-bottom:8px;">${data.chain_name}</h2>
            <p style="color:var(--muted);margin-bottom:20px;font-size:14px;">${data.description}</p>`;

        data.nodes.forEach(node => {
            html += `<div style="margin-bottom:16px;">
                <div style="font-weight:700;font-size:14px;margin-bottom:8px;color:${data.theme_color};">
                    Layer ${node.position}: ${node.layer}
                    <span style="font-weight:400;color:var(--muted);font-size:12px;"> — sensitivity: ${(node.sensitivity*100).toFixed(0)}%</span>
                </div>
                <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">${node.description}</div>`;
            node.tickers.forEach(t => {
                const changeClass = (t.change_pct || 0) >= 0 ? 'positive' : 'negative';
                const priceStr = t.current_price ? `$${t.current_price.toFixed(2)}` : '';
                const changeStr = t.current_price ? ` (${t.change_pct >= 0 ? '+' : ''}${t.change_pct.toFixed(1)}%)` : '';
                html += `<div class="rec-card">
                    <div>
                        <span style="font-weight:700;color:var(--accent);">${t.ticker}</span> ${t.company}
                        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${t.thesis}</div>
                        <div class="conviction-bar" style="width:120px;margin-top:6px;"><div class="conviction-fill" style="width:${t.conviction*100}%;"></div></div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:600;">${priceStr}</div>
                        <div class="${changeClass}" style="font-size:13px;">${changeStr}</div>
                    </div>
                </div>`;
            });
            html += '</div>';
        });

        document.getElementById('chainDetail').innerHTML = html;
        document.getElementById('chainModal').classList.add('show');
    } catch(e) { console.error(e); }
}

async function analyzeEvent() {
    const headline = document.getElementById('analyzeInput').value.trim();
    if (!headline) return;

    const resultDiv = document.getElementById('analysisResult');
    resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing impact...</div>';

    try {
        const resp = await fetch(`${API}/analyze`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ headline })
        });
        const data = await resp.json();
        if (!data.success) { resultDiv.innerHTML = `<p style="color:var(--red);">${data.error}</p>`; return; }

        let html = `<div class="summary-box">${data.summary}</div>`;

        if (data.top_picks && data.top_picks.length) {
            html += '<div style="margin-top:16px;">';
            data.top_picks.forEach(t => {
                const dirIcon = t.direction === 'bullish' ? '🟢' : '🔴';
                const priceStr = t.current_price ? `$${t.current_price.toFixed(2)}` : '';
                html += `<div class="rec-card">
                    <div>
                        <span style="font-weight:700;color:var(--accent);">${dirIcon} ${t.ticker}</span> ${t.company}
                        <div style="font-size:12px;color:var(--muted);">${t.chain_name} → ${t.layer} | ${t.time_horizon.replace('_',' ')} | ${(t.conviction*100).toFixed(0)}% conviction</div>
                    </div>
                    <div style="text-align:right;font-weight:600;">${priceStr}</div>
                </div>`;
            });
            html += '</div>';
        }

        if (data.chains && data.chains.length) {
            html += '<div style="margin-top:12px;font-size:13px;color:var(--muted);">Chains impacted: ';
            html += data.chains.map(c => `<span class="chain-tag" style="border-color:${c.theme_color}">${c.chain_name} (${(c.relevance_score*100).toFixed(0)}%)</span>`).join(' ');
            html += '</div>';
        }

        html += '<div style="margin-top:12px;font-size:11px;color:#4b5563;font-style:italic;">Not financial advice. For informational purposes only.</div>';
        resultDiv.innerHTML = html;
    } catch(e) { resultDiv.innerHTML = '<p style="color:var(--red);">Analysis failed.</p>'; }
}

function exportCSV() { window.location.href = `${API}/export`; }

function getTimeAgo(ts) {
    const diff = (Date.now() - new Date(ts).getTime()) / 1000;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
}

// Auth
async function checkAuth() {
    try {
        const resp = await fetch(`${API}/auth/me`, {credentials:'same-origin'});
        const data = await resp.json();
        if (data.authenticated) {
            currentUser = data.user;
            document.getElementById('authBtn').textContent = data.user.email.split('@')[0];
        }
    } catch(e) {}
}

function showAuth() {
    if (currentUser) {
        if (confirm(`${currentUser.email}\nTier: ${currentUser.tier}\n\nSign out?`)) {
            fetch(`${API}/auth/logout`, {method:'POST',credentials:'same-origin'});
            currentUser = null;
            document.getElementById('authBtn').textContent = 'Sign In';
        }
        return;
    }
    authMode = 'login';
    document.getElementById('authTitle').textContent = 'Sign In';
    document.getElementById('authModal').classList.add('show');
}

function toggleAuth() {
    authMode = authMode === 'login' ? 'register' : 'login';
    document.getElementById('authTitle').textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
    document.getElementById('authToggleText').innerHTML = authMode === 'login'
        ? 'Don\'t have an account? <a href="#" onclick="toggleAuth()" style="color:var(--accent);">Register</a>'
        : 'Already have an account? <a href="#" onclick="toggleAuth()" style="color:var(--accent);">Sign In</a>';
}

async function submitAuth() {
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    const endpoint = authMode === 'login' ? '/auth/login' : '/auth/register';
    try {
        const resp = await fetch(`${API}${endpoint}`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            credentials:'same-origin', body:JSON.stringify({email,password})
        });
        const data = await resp.json();
        if (data.success || data.user) {
            currentUser = data.user;
            document.getElementById('authBtn').textContent = data.user.email.split('@')[0];
            document.getElementById('authModal').classList.remove('show');
        } else {
            document.getElementById('authError').textContent = data.error;
            document.getElementById('authError').style.display = 'block';
        }
    } catch(e) {}
}

// Init
loadData();
</script>
</body>
</html>
